<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Chatbot</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #000;
        color: #ececec;
        font-family: system-ui, -apple-system, sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      #chat { flex: 1; overflow-y: auto; padding: 24px 0 120px; }
      .message { padding: 24px 0; border-bottom: 1px solid #1a1a1a; }
      .message-inner {
        max-width: 768px;
        margin: 0 auto;
        padding: 0 24px;
        display: flex;
        gap: 16px;
        line-height: 1.6;
      }
      .message.user { background: #0d0d0d; }
      .message.assistant, .message.system { background: #000; }
      .avatar {
        width: 28px; height: 28px; border-radius: 4px; flex-shrink: 0;
        display: flex; align-items: center; justify-content: center;
        font-size: 12px; font-weight: 600;
      }
      .avatar.user { background: #5436da; }
      .avatar.assistant { background: #19c37d; color: #000; }
      .avatar.system { background: #333; color: #aaa; }
      .bubble { flex: 1; word-break: break-word; }
      .bubble p { margin-bottom: 12px; white-space: pre-wrap; }
      .data-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 8px;
        font-size: 14px;
      }
      .data-table th, .data-table td {
        border: 1px solid #333;
        padding: 8px 10px;
        text-align: left;
      }
      .data-table th { background: #111; }
      .chart-wrap {
        margin-top: 12px;
        background: #0d0d0d;
        border: 1px solid #222;
        border-radius: 12px;
        padding: 16px;
        max-width: 640px;
      }
      #input-area {
        position: fixed; bottom: 0; left: 0; right: 0;
        background: linear-gradient(transparent, #000 24px);
        padding: 0 24px 24px;
      }
      #input-box {
        max-width: 768px; margin: 0 auto;
        background: #1a1a1a; border: 1px solid #333; border-radius: 24px;
        display: flex; align-items: flex-end; padding: 8px 8px 8px 16px; gap: 8px;
      }
      #question {
        flex: 1; background: transparent; border: none; color: #ececec;
        font-size: 16px; line-height: 1.5; resize: none; max-height: 200px;
        padding: 8px 0; font-family: inherit;
      }
      #question:focus { outline: none; }
      .icon-btn {
        width: 36px; height: 36px; border: none; border-radius: 50%;
        background: #fff; color: #000; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
      }
      .icon-btn:disabled { background: #444; color: #888; cursor: not-allowed; }
      .empty-state, .status-bar {
        max-width: 768px; margin: 0 auto; padding: 0 24px; color: #666; font-size: 14px;
      }
      .status-bar { margin-top: 12px; color: #888; }
    </style>
  </head>
  <body>
    <div id="chat">
      <div class="empty-state" id="empty-state">Ask questions about your data file.</div>
    </div>
    <div class="status-bar" id="data-status"></div>

    <div id="input-area">
      <div id="input-box">
        <textarea id="question" rows="1" placeholder="Ask a question..."></textarea>
        <button id="send-btn" class="icon-btn" type="button" title="Send">➤</button>
      </div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
