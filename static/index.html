<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #000;
        color: #ececec;
        font-family: system-ui, -apple-system, sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      #chat {
        flex: 1;
        overflow-y: auto;
        padding: 24px 0 120px;
      }
      .message {
        padding: 24px 0;
        border-bottom: 1px solid #1a1a1a;
      }
      .message:last-child { border-bottom: none; }
      .message-inner {
        max-width: 768px;
        margin: 0 auto;
        padding: 0 24px;
        display: flex;
        gap: 16px;
        line-height: 1.6;
      }
      .message.user { background: #0d0d0d; }
      .message.assistant { background: #000; }
      .message.system { background: #000; }
      .avatar {
        width: 28px;
        height: 28px;
        border-radius: 4px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 600;
      }
      .avatar.user { background: #5436da; }
      .avatar.assistant { background: #19c37d; color: #000; }
      .avatar.system { background: #333; color: #aaa; }
      .bubble {
        flex: 1;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .bubble.streaming::after {
        content: "▋";
        animation: blink 1s step-end infinite;
      }
      @keyframes blink { 50% { opacity: 0; } }
      #input-area {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(transparent, #000 24px);
        padding: 0 24px 24px;
      }
      #input-box {
        max-width: 768px;
        margin: 0 auto;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 24px;
        display: flex;
        align-items: flex-end;
        padding: 8px 8px 8px 16px;
        gap: 8px;
      }
      #input-box:focus-within { border-color: #555; }
      #question {
        flex: 1;
        background: transparent;
        border: none;
        color: #ececec;
        font-size: 16px;
        line-height: 1.5;
        resize: none;
        max-height: 200px;
        padding: 8px 0;
        font-family: inherit;
      }
      #question:focus { outline: none; }
      .icon-btn {
        width: 36px;
        height: 36px;
        border: none;
        border-radius: 50%;
        background: transparent;
        color: #aaa;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .icon-btn:hover { background: #333; color: #fff; }
      #send-btn {
        background: #fff;
        color: #000;
      }
      #send-btn:hover { background: #ddd; }
      #send-btn:disabled { background: #444; color: #888; cursor: not-allowed; }
      .empty-state {
        max-width: 768px;
        margin: 80px auto;
        padding: 0 24px;
        text-align: center;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div id="chat">
      <div class="empty-state" id="empty-state">Upload a file, then ask questions about it.</div>
    </div>

    <div id="input-area">
      <div id="input-box">
        <button id="upload-btn" class="icon-btn" type="button" title="Upload file">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </button>
        <textarea id="question" rows="1" placeholder="Message..."></textarea>
        <button id="send-btn" class="icon-btn" type="button" title="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
        <input id="file-input" type="file" hidden accept=".pdf,.txt,.md,.csv,.docx,.xlsx,text/csv" />
      </div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
